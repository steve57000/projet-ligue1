services:
  postgres:
    image: postgres:16
    container_name: ligue1-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ligue1_2025

    ports:
      - "5432:5432"

    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./sql:/sql
      - ./data:/data

volumes:
  pgdata: